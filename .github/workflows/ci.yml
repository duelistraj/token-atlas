name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install optional validation dependencies
        run: python -m pip install PyYAML tiktoken
      - name: Run non-benchmark unit tests
        run: python -m unittest tests.test_contract_consistency tests.test_two_tier_boundary tests.test_pkf_validate -v
      - name: Validate fixture PKF trees
        run: python scripts/pkf_validate.py --path .agents/skills/token-atlas/benchmarks/fixtures/schema-change/repo/.ai --strictness ci

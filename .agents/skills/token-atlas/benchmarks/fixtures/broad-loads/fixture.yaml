name: broad-loads
suites:
  - core
  - full
goal: Verify broad or unrelated pkf.loads chains are detected.
repo_root: repo
language: typescript
workflow:
  - simulate
  - optimize
  - validation
intent: Change an API route
source_shape:
  pkf_runtime: present
  modules:
    - backend
    - frontend
  source_roots:
    - src/backend
    - src/frontend
changed_paths:
  - src/backend/routes/orders.ts
deleted_paths: []
expected_modules:
  - backend
expected_required_docs:
  - .ai/PKF.md
  - .ai/MEMORY.md
  - .ai/ARCHITECTURE.md
  - .ai/knowledge/INDEX.md
  - .ai/knowledge/backend/INDEX.md
  - .ai/knowledge/backend/api.md
forbidden_loads:
  - .ai/knowledge/frontend/
  - optional context through pkf.loads
expected_warnings:
  - Token budget warning if the broad load crosses a threshold.
expected_errors:
  - Unrelated module loaded automatically through pkf.loads.
token_thresholds:
  full_token_budget_required: true
exit_behavior:
  ci: 1

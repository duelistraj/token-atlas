  - .ai/knowledge/backend/schema.md
  - .ai/knowledge/backend/business_rules.md
  - .ai/knowledge/backend/ui.md
  - .ai/retrieval/
expected_warnings: []
expected_errors: []
token_thresholds:
  module_task_warn_above: 8000
exit_behavior:
  advisory: 0
  ci: 0

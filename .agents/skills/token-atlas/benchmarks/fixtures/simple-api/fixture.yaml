name: simple-api
suites:
  - quick
  - core
  - full
goal: Verify source-backed API extraction and route-change retrieval.
repo_root: repo
language: typescript
workflow:
  - initialize_if_needed
  - extract
  - simulate
  - validation
intent: Change an API route
source_shape:
  pkf_runtime: missing
  modules:
    - backend
  source_roots:
    - src/backend
changed_paths:
  - src/backend/routes/orders.ts
deleted_paths: []
expected_modules:
  - backend
expected_required_docs:

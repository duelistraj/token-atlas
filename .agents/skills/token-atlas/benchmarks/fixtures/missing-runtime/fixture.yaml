name: missing-runtime
suites:
  - quick
  - core
  - full
goal: Verify startup recovery when .ai/PKF.md is absent.
repo_root: repo
language: typescript
workflow:
  - initialize
  - validation
source_shape:
  pkf_runtime: missing
  modules:
    - backend
  source_roots:
    - src/backend
changed_paths: []
deleted_paths: []
expected_modules:
  - backend
expected_required_docs:
  generated:
    - .ai/PKF.md
    - .ai/MEMORY.md
    - .ai/ARCHITECTURE.md
    - .ai/knowledge/INDEX.md
    - .ai/knowledge/glossary.md
    - .ai/knowledge/dependencies.md
    - .ai/knowledge/decision_log.md
    - .ai/knowledge/backend/INDEX.md
    - .ai/knowledge/backend/api.md
    - .ai/knowledge/backend/schema.md
    - .ai/knowledge/backend/business_rules.md
    - .ai/knowledge/backend/ui.md
forbidden_loads:
  - .ai/retrieval/
  - unrelated module leaf docs
expected_warnings:
  - Unknown implementation details may remain TODO after initialization.
expected_errors:
  before_recovery_ci:
    - Missing .ai/PKF.md startup contract.
  after_recovery: []
token_thresholds:
  startup_path_warn_above: 4000
exit_behavior:
  advisory_after_recovery: 0
  ci_before_recovery: 1
  ci_after_recovery: 0

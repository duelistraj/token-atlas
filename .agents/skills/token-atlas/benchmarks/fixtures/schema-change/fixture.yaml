name: schema-change
suites:
  - core
  - full
goal: Verify schema or data-model changes route to schema knowledge only.
repo_root: repo
language: typescript
workflow:
  - maintenance
  - extract
  - simulate
  - validation
intent: Change a schema or data model
patch: changes.patch
source_shape:
  pkf_runtime: present
  modules:
    - backend
  source_roots:
    - src/backend
changed_paths:
  - src/backend/models/customer.ts
deleted_paths: []
expected_modules:
  - backend
expected_required_docs:
  - .ai/PKF.md
  - .ai/MEMORY.md
  - .ai/ARCHITECTURE.md
  - .ai/knowledge/INDEX.md
  - .ai/knowledge/backend/INDEX.md
  - .ai/knowledge/backend/schema.md
forbidden_loads:
  - .ai/knowledge/backend/api.md
  - .ai/knowledge/backend/business_rules.md
  - .ai/knowledge/backend/ui.md
  - unrelated module docs
expected_warnings: []
expected_errors: []
token_thresholds:
  leaf_warn_above: 1500
exit_behavior:
  ci: 0
